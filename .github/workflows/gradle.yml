name: Java CI with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Download SUT
      run: |
        mkdir -p artifacts
        wget -O artifacts/app-order.jar https://github.com/netology-code/aqa-homeworks/raw/master/web/app-order.jar
    
    - name: Start SUT
      run: |
        java -jar ./artifacts/app-order.jar &
        sleep 5
    
    - name: Run tests
      run: ./gradlew test --info
