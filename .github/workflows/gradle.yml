name: Java CI with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest  # Используем Windows, где Chrome уже есть
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      shell: bash
    
    - name: Download SUT
      run: |
        mkdir -p artifacts
        curl -o artifacts/app-order.jar https://github.com/netology-code/aqa-homeworks/raw/master/web/app-order.jar
      shell: bash
    
    - name: Start SUT
      run: |
        java -jar artifacts/app-order.jar &
        sleep 10
      shell: bash
    
    - name: Run tests
      run: ./gradlew test --info
      shell: bash
